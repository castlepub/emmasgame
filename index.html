<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>הרפתקאת המנגינה הקסומה של אמה</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <div id="game-stage">
      <div id="game-viewport">
        <canvas id="game-canvas" width="1280" height="720"></canvas>

        <div id="rotate-hint" class="rotate-hint hidden" aria-hidden="true">
          <div class="rotate-hint-box">
            <span class="rotate-icon" aria-hidden="true">📱</span>
            <p>סובבי את המסך לאורך כדי לשחק</p>
            <p class="rotate-hint-sub">המשחק נראה הכי טוב במצב אופקי</p>
          </div>
        </div>

        <div id="riddle-overlay" class="hidden" aria-hidden="true">
          <div id="riddle-panel">
            <h2 id="riddle-title">✨ חידה מוזיקלית ✨</h2>
            <p id="riddle-question"></p>
            <p id="riddle-prompt">הקלידי תשובה ולחצי שליחה</p>
            <input type="text" id="riddle-input" dir="rtl" autocomplete="off" autocapitalize="off" spellcheck="false" maxlength="40" placeholder="התשובה שלך…">
            <button type="button" id="riddle-submit-btn">שליחה</button>
            <p id="riddle-feedback-text" aria-live="polite"></p>
            <p id="riddle-hint-text" aria-live="polite"></p>
          </div>
        </div>
      </div>

      <div id="touch-controls" class="hidden">
        <div class="touch-pad touch-pad-left">
          <button type="button" id="btn-left" class="touch-btn" aria-label="זוזי שמאלה">◀</button>
          <button type="button" id="btn-right" class="touch-btn" aria-label="זוזי ימינה">▶</button>
        </div>
        <div class="touch-pad touch-pad-right">
          <button type="button" id="btn-jump" class="touch-btn" aria-label="קפיצה">▲</button>
        </div>
      </div>
    </div>

    <div id="start-panel" class="hidden" aria-hidden="true">
      <div class="start-panel-grid">
        <div class="start-name-block">
          <label for="player-name-input">שם המוזיקאית</label>
          <div class="name-input-row">
            <input type="text" id="player-name-input" dir="rtl" inputmode="text" enterkeyhint="done" autocomplete="nickname" autocapitalize="words" spellcheck="false" maxlength="20" placeholder="השם שלך…">
            <button type="button" id="name-confirm-btn" class="name-confirm-btn">אישור</button>
          </div>
          <p id="name-save-hint" class="name-save-hint">לחצי Enter או אישור — השדה ייעלם ואפשר להתחיל לשחק</p>
        </div>
        <div id="name-collapsed-bar" class="name-collapsed-bar hidden" aria-hidden="true">
          <span id="name-display-label"></span>
          <button type="button" id="edit-name-btn" class="edit-name-btn">שני שם</button>
        </div>
        <div id="leaderboard-panel">
          <h3 id="leaderboard-title">🏆 טבלת המובילים</h3>
          <ol id="leaderboard-list"></ol>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
